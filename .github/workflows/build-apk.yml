name: Build Android APK

on:
  push:
    branches:
      - claude/create-devlearn-app-2T1aZ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/create-devlearn-app-2T1aZ

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 34
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Configure Gradle
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-de-aprendizaje-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
